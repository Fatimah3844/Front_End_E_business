<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body data-page="cart">
    <header class="navbar">
      <a class="logo" href="index.html">🌿 FreshMarket</a>
      <div class="search-bar">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input
          type="text"
          placeholder="Your cart items..."
          disabled
        />
      </div>
      <div class="nav-icons">
        <a class="icon-badge" href="index.html"><i class="fa-solid fa-store"></i></a>
        <div id="authActions" class="auth-actions"></div>
      </div>
    </header>

    <h1 class="title">Shopping Cart</h1>
    <p id="statusMessage" class="status-message page-message"></p>

    <div class="cart-container">
      <div id="cartItems" class="cart-items">
        <!-- Rendered from API -->
      </div>

      <div class="summary">
        <h3>Order Summary</h3>

        <div class="row">
          <span>Subtotal</span>
          <span id="subtotal">$12.78</span>
        </div>

        <div class="row">
          <span>Tax (8%)</span>
          <span id="tax">$1.02</span>
        </div>

        <div class="row">
          <span>Delivery Fee</span>
          <span>$4.99</span>
        </div>

        <hr />

        <div class="total">
          <span>Total</span>
          <span id="total">$18.79</span>
        </div>

        <button id="checkoutBtn" class="checkout">Preview Checkout</button>
        <button id="placeOrderBtn" class="continue">Place Order</button>
      </div>
    </div>

    <script type="module" src="script-app.js"></script>
  </body>
</html>
